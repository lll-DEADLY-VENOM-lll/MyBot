openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: youtube
    description: YouTube video operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /yt/search:
    get:
      operationId: ytSearch
      tags: [youtube]
      summary: Search YouTube videos
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: max
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Max results
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoListResponse"

  /yt/trending:
    get:
      operationId: ytTrending
      tags: [youtube]
      summary: Get trending YouTube videos
      responses:
        "200":
          description: Trending videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoListResponse"

  /yt/stream:
    get:
      operationId: ytStream
      tags: [youtube]
      summary: Get stream URL for a video
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
          description: YouTube video ID
      responses:
        "200":
          description: Stream info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamInfo"
        "502":
          description: Stream fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    VideoItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        thumb:
          type: string
        duration:
          type: string
        views:
          type: string
        channel:
          type: string
      required:
        - id
        - title
        - thumb
        - duration
        - views
        - channel

    VideoListResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/VideoItem"
      required:
        - results

    StreamInfo:
      type: object
      properties:
        title:
          type: string
        stream:
          type: string
        thumb:
          type: string
        source:
          type: string
        error:
          type: string
      required: []

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
